<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ray Generation & Orthogonal Matrix</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #080808;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #controls-hint {
            position: absolute;
            bottom: 25px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            font-size: 15px;
            pointer-events: none;
            letter-spacing: 1px;
            z-index: 10;
        }
        #controls-hint span {
            margin: 0 15px;
            background: rgba(0, 0, 0, 0.6);
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #math-formula {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #FFFFFF;
            font-size: 35px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 20;
            background: rgba(0, 0, 0, 0.4);
            padding: 10px 25px;
            border-radius: 15px;
            border-left: 5px solid #2288FF;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease-in-out;
        }
        #h-label {
            position: absolute;
            color: #FFFF00;
            font-size: 35px;
            font-weight: bold;
            pointer-events: none;
            z-index: 15;
            text-shadow: 2px 2px 4px #000;
            display: none;
            transform: translate(-50%, -50%);
        }
        #theta-label {
            position: absolute;
            color: #FFFFFF;
            font-size: 35px;
            pointer-events: none;
            z-index: 15;
            text-shadow: 2px 2px 4px #000;
            display: none;
            transform: translate(-50%, -50%);
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
                "@tweenjs/tween.js": "https://unpkg.com/@tweenjs/tween.js@23.1.1/dist/tween.esm.js"
            }
        }
    </script>
</head>
<body>
<div id="math-formula"></div>
<div id="h-label">1</div>
<div id="theta-label"></div>

<div id="controls-hint">
    <span>🖱️ Trái: Bước tiếp theo</span>
    <span>🖱️ Phải: Lùi lại</span>
    <span>🖐️ Kéo: Xoay Camera</span>
</div>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import TWEEN from '@tweenjs/tween.js';

    // ==========================================
    // 1. SETUP SCENE, CAMERA, RENDERER
    // ==========================================
    const scene = new THREE.Scene();
    const gridHelper = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
    scene.add(gridHelper);

    const coneInitialPos = new THREE.Vector3(0, 0, 0);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    const startCamPos = new THREE.Vector3(0, 4, 8);
    camera.position.copy(startCamPos);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    // Bật tính năng tự động xoay camera
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.0;
    controls.target.set(0, 1.5, 0);
    controls.mouseButtons = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: null };

    window.isCameraPanning = false;

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 1.2);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    // ==========================================
    // 2. MÔ HÌNH HÌNH THOI (CÁCH XA TRUNG TÂM)
    // ==========================================
    const modelGroup = new THREE.Group();
    scene.add(modelGroup);

    modelGroup.position.set(7, 2, -4);
    modelGroup.rotation.set(Math.PI / 6, Math.PI / 4, 0);

    const pTop = new THREE.Vector3(0, 3, 0);
    const pBot = new THREE.Vector3(0, -3, 0);
    const pFront = new THREE.Vector3(0, 0, 3);
    const pRight = new THREE.Vector3(3, 0, 0);
    const pBack = new THREE.Vector3(0, 0, -3);
    const pLeft = new THREE.Vector3(-3, 0, 0);

    const faces = [];
    function createTri(p1, p2, p3) {
        const geo = new THREE.BufferGeometry().setFromPoints([p1, p2, p3]);
        geo.computeVertexNormals();
        const mat = new THREE.MeshPhongMaterial({ color: 0x1155AA, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
        const mesh = new THREE.Mesh(geo, mat);
        const edgeMat = new THREE.LineBasicMaterial({ color: 0x88CCFF, transparent: true, opacity: 0.5 });
        mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat));
        modelGroup.add(mesh);
        faces.push(mesh);
    }

    createTri(pTop, pFront, pRight); createTri(pTop, pRight, pBack);
    createTri(pTop, pBack, pLeft);   createTri(pTop, pLeft, pFront);
    createTri(pBot, pRight, pFront); createTri(pBot, pBack, pRight);
    createTri(pBot, pLeft, pBack);   createTri(pBot, pFront, pLeft);

    const targetVertexLocal = pRight.clone();
    const targetNormalLocal = new THREE.Vector3(1, 0, 0);

    modelGroup.updateMatrixWorld(true);
    const targetVertex = targetVertexLocal.applyMatrix4(modelGroup.matrixWorld);
    const targetNormal = targetNormalLocal.transformDirection(modelGroup.matrixWorld).normalize();
    const invNormal = targetNormal.clone().multiplyScalar(-1);

    const vertexDot = new THREE.Mesh(new THREE.SphereGeometry(0.12, 16, 16), new THREE.MeshBasicMaterial({color: 0xFFFFFF}));
    vertexDot.position.copy(targetVertex);
    vertexDot.visible = false;
    scene.add(vertexDot);

    // ==========================================
    // 3. TẠO HÌNH NÓN Ở TRUNG TÂM & ĐƯỜNG TOÁN HỌC (ĐỊNH HƯỚNG THEO TRỤC Y)
    // ==========================================
    const coneHeight = 3.0;
    const coneHalfAngle = 35 * (Math.PI / 180); // Nửa góc nón
    const coneRadius = coneHeight * Math.tan(coneHalfAngle);

    const coneGroup = new THREE.Group();
    coneGroup.position.copy(coneInitialPos);
    scene.add(coneGroup);

    const coneGeo = new THREE.CylinderGeometry(coneRadius, 0.01, coneHeight, 32);
    coneGeo.translate(0, coneHeight / 2, 0);

    const coneMat = new THREE.MeshPhongMaterial({ color: 0x2288FF, transparent: true, opacity: 0.0, side: THREE.DoubleSide, depthWrite: false });
    const coneMesh = new THREE.Mesh(coneGeo, coneMat);
    const coneEdges = new THREE.LineSegments(new THREE.EdgesGeometry(coneGeo), new THREE.LineBasicMaterial({ color: 0x88CCFF, transparent: true, opacity: 0.0 }));
    coneGroup.add(coneMesh);
    coneGroup.add(coneEdges);

    const mathGroup = new THREE.Group();
    const lineMatYellow = new THREE.LineBasicMaterial({ color: 0xFFFF00, linewidth: 3, transparent: true, opacity: 0 });
    const lineMatRed = new THREE.LineBasicMaterial({ color: 0xFF0000, linewidth: 3, transparent: true, opacity: 0 });

    // Trục dọc theo phương Y
    const hLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(0, coneHeight, 0)]), lineMatYellow);
    // Bán kính theo phương X
    const rLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0, coneHeight, 0), new THREE.Vector3(coneRadius, coneHeight, 0)]), lineMatRed);
    // Cạnh huyền 1 & 2
    const hypLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(coneRadius, coneHeight, 0)]), lineMatYellow);
    const hypLine2 = new THREE.Line(new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,0,0), new THREE.Vector3(-coneRadius, coneHeight, 0)]), lineMatYellow);

    mathGroup.add(hLine, rLine, hypLine, hypLine2);

    // Vẽ cung tròn hiển thị góc Theta toàn phần (từ -halfAngle đến +halfAngle)
    const arcRadius = 1.2;
    const arcPts = [];
    for (let i = -20; i <= 20; i++) {
        const a = (i / 20) * coneHalfAngle;
        arcPts.push(new THREE.Vector3(arcRadius * Math.sin(a), arcRadius * Math.cos(a), 0));
    }
    const arcLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(arcPts), new THREE.LineBasicMaterial({ color: 0xFFFFFF, linewidth: 2, transparent: true, opacity: 0 }));
    mathGroup.add(arcLine);

    coneGroup.add(mathGroup);

    hLine.visible = false; rLine.visible = false; hypLine.visible = false; hypLine2.visible = false; arcLine.visible = false;

    const hMidPos = new THREE.Vector3(0, coneHeight / 2, 0);
    // Đặt nhãn theta thấp xuống một chút để không trùng với số 1 (Y=1.5)
    const thetaPos = new THREE.Vector3(0, arcRadius - 0.3, 0);

    const thetaLabel = document.getElementById('theta-label');
    katex.render("\\theta", thetaLabel, { throwOnError: false });

    // ==========================================
    // 4. RANDOM POINTS (UNIT EDGE -> EDGE -> INNER)
    // ==========================================
    const pointsGroup = new THREE.Group();
    coneGroup.add(pointsGroup);
    const numPoints = 12;

    const ptData = [];
    const ptMeshes = [];
    const radialLines = [];

    const circlePts = [];
    for(let i=0; i<=64; i++) {
        const a = i/64*Math.PI*2;
        circlePts.push(new THREE.Vector3(Math.cos(a), 0, Math.sin(a)));
    }
    const circleGeo = new THREE.BufferGeometry().setFromPoints(circlePts);
    const circleLine = new THREE.Line(circleGeo, new THREE.LineBasicMaterial({color: 0xAAAAAA, transparent: true, opacity: 0}));
    circleLine.position.set(0, coneHeight, 0);
    circleLine.visible = false;
    coneGroup.add(circleLine);

    const centerBase = new THREE.Vector3(0, coneHeight, 0);

    for(let i=0; i<numPoints; i++){
        const theta_rot = Math.random() * Math.PI * 2;
        const u1 = Math.random();

        const pUnitEdge = new THREE.Vector3(Math.cos(theta_rot), coneHeight, Math.sin(theta_rot));
        const pEdge = new THREE.Vector3(coneRadius * Math.cos(theta_rot), coneHeight, coneRadius * Math.sin(theta_rot));

        const r_inner = coneRadius * Math.sqrt(u1);
        const pInner = new THREE.Vector3(r_inner * Math.cos(theta_rot), coneHeight, r_inner * Math.sin(theta_rot));

        ptData.push({ pUnitEdge, pEdge, pInner });

        const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), new THREE.MeshBasicMaterial({ color: 0xFFFFFF }));
        mesh.position.copy(pUnitEdge);
        mesh.visible = false;
        pointsGroup.add(mesh);
        ptMeshes.push(mesh);

        // Đường bán kính liên kết động với các hạt (Màu Đỏ)
        const rGeo = new THREE.BufferGeometry().setFromPoints([centerBase, pUnitEdge]);
        const rMat = new THREE.LineBasicMaterial({ color: 0xFF0000, transparent: true, opacity: 0, linewidth: 2 });
        const rLineObj = new THREE.Line(rGeo, rMat);
        rLineObj.visible = false;
        coneGroup.add(rLineObj);
        radialLines.push(rLineObj);
    }

    // ==========================================
    // 5. CROSS PRODUCT VÀ MA TRẬN TRỰC GIAO
    // ==========================================
    const worldUp = new THREE.Vector3(0, 1, 0);
    if (Math.abs(invNormal.dot(worldUp)) > 0.999) worldUp.set(1, 0, 0);

    const localY = invNormal.clone();
    const localX = new THREE.Vector3().crossVectors(worldUp, localY).normalize();
    const localZ = new THREE.Vector3().crossVectors(localX, localY).normalize();

    const rotMatrix = new THREE.Matrix4().makeBasis(localX, localY, localZ);
    const finalQuat = new THREE.Quaternion().setFromRotationMatrix(rotMatrix);

    function createArrow(origin, dir, length, colorHex) {
        const arrow = new THREE.ArrowHelper(dir.clone().normalize(), origin, length, colorHex, length*0.2, length*0.15);
        arrow.visible = false;
        scene.add(arrow);
        return arrow;
    }

    const lenVec = 2.0;
    const arrNorm = createArrow(targetVertex, targetNormal, lenVec, 0x888888);
    const arrInvNorm = createArrow(targetVertex, localY, lenVec, 0x00FFFF);
    const arrUp = createArrow(targetVertex, worldUp, lenVec, 0xFFFFFF);
    const arrRight = createArrow(targetVertex, localX, lenVec, 0xFF0000);
    const arrTrueUp = createArrow(targetVertex, localZ, lenVec, 0x00FF00);

    // ==========================================
    // 6. TIA RAY VÀ TÍNH TOÁN RAYCAST
    // ==========================================
    const rays = [];
    const rayMatObj = new THREE.LineBasicMaterial({ color: 0xFFFF00, transparent: true, opacity: 0, linewidth: 2 });
    for(let i=0; i<numPoints; i++) {
        const geo = new THREE.BufferGeometry().setFromPoints([targetVertex, targetVertex]);
        const line = new THREE.Line(geo, rayMatObj);
        line.visible = false;
        scene.add(line);
        rays.push(line);
    }

    const raycaster = new THREE.Raycaster();
    const intersectPts = [];
    const hitDistances = [];
    const intersectDots = [];

    for(let i=0; i<numPoints; i++){
        const localDir = ptData[i].pInner.clone().normalize();
        const worldDir = localDir.clone().applyQuaternion(finalQuat).normalize();

        raycaster.set(targetVertex.clone().add(worldDir.clone().multiplyScalar(0.01)), worldDir);
        const intersects = raycaster.intersectObjects(faces, false);

        if(intersects.length > 0) {
            intersectPts.push(intersects[0].point);
            hitDistances.push(intersects[0].distance + 0.01);
        } else {
            intersectPts.push(targetVertex.clone().add(worldDir.clone().multiplyScalar(15)));
            hitDistances.push(15);
        }

        const dot = new THREE.Mesh(new THREE.SphereGeometry(0.1, 8, 8), new THREE.MeshBasicMaterial({ color: 0xFF0000 }));
        dot.visible = false;
        scene.add(dot);
        intersectDots.push(dot);
    }

    const validHits = hitDistances.filter(d => d < 15);
    const avgDist = validHits.length > 0 ? (validHits.reduce((a,b)=>a+b, 0) / validHits.length) : 0;

    // ==========================================
    // 7. CÔNG THỨC & STATE MACHINE (14 BƯỚC)
    // ==========================================
    const mathFormulas = [
        "", // Step 0
        "{\\color{#FF0000}r} = 1 \\cdot \\tan(\\theta / 2)", // Step 1: r màu đỏ
        "\\begin{cases} x = 1 \\cdot \\cos(2\\pi \\theta_{rand}) \\\\ z = 1 \\cdot \\sin(2\\pi \\theta_{rand}) \\end{cases}", // Step 2
        "\\begin{cases} x = {\\color{#FF0000}r} \\cos(2\\pi \\theta_{rand}) \\\\ z = {\\color{#FF0000}r} \\sin(2\\pi \\theta_{rand}) \\end{cases}", // Step 3
        "\\begin{cases} x = {\\color{#FF0000}r} \\sqrt{u_{1\\_rand}} \\cos(2\\pi \\theta_{rand}) \\\\ z = {\\color{#FF0000}r} \\sqrt{u_{1\\_rand}} \\sin(2\\pi \\theta_{rand}) \\end{cases}", // Step 4
        "\\vec{N}_{vertex}", // Step 5
        "{\\color{#00FFFF}\\vec{Y}} = {\\color{#00FFFF}\\vec{N}_{inv}} = -\\vec{N}_{vertex}", // Step 6
        "\\vec{Up} = (0, 1, 0)", // Step 7
        "{\\color{#FF0000}\\vec{X}} = \\vec{Up} \\times {\\color{#00FFFF}\\vec{Y}}", // Step 8
        "{\\color{#FF0000}\\vec{X}} = \\vec{Up} \\times {\\color{#00FFFF}\\vec{Y}}", // Step 9
        "{\\color{#00FF00}\\vec{Z}} = {\\color{#FF0000}\\vec{X}} \\times {\\color{#00FFFF}\\vec{Y}}", // Step 10
        "M_{rot} = [{\\color{#FF0000}\\vec{X}}, {\\color{#00FFFF}\\vec{Y}}, {\\color{#00FF00}\\vec{Z}}]", // Step 11
        "M_{rot} \\times \\text{Random Vertex}_{rand}", // Step 12
        "Ray_{i\\_rand} \\to \\infty", // Step 13
        `d_{avg} = \\frac{1}{${validHits.length}} \\sum d_{i\\_rand} \\approx ${avgDist.toFixed(2)}` // Step 14
    ];

    const mathOverlay = document.getElementById('math-formula');
    const hLabel = document.getElementById('h-label');

    function updateMathFormulaImmediate(step) {
        if (step === 0) {
            mathOverlay.style.opacity = 0;
            mathOverlay.style.display = 'none';
        } else {
            mathOverlay.style.display = 'block';
            katex.render(mathFormulas[step], mathOverlay, { throwOnError: false });
            mathOverlay.style.opacity = 1;
        }
    }

    async function changeMathFormula(step) {
        if (mathOverlay.style.opacity > 0 && mathOverlay.style.display !== 'none') {
            mathOverlay.style.opacity = 0;
            await new Promise(r => setTimeout(r, 300));
        }
        if (step === 0) {
            mathOverlay.style.display = 'none';
        } else {
            mathOverlay.style.display = 'block';
            katex.render(mathFormulas[step], mathOverlay, { throwOnError: false });
            mathOverlay.style.opacity = 1;
        }
    }

    function updateLabels() {
        if (window.currentStep === 1) {
            hLabel.style.display = 'block';
            thetaLabel.style.display = 'block';

            const v1 = hMidPos.clone().applyMatrix4(coneGroup.matrixWorld).project(camera);
            hLabel.style.left = `${(v1.x * 0.5 + 0.5) * window.innerWidth + 15}px`;
            hLabel.style.top = `${(v1.y * -0.5 + 0.5) * window.innerHeight}px`;

            const vTheta = thetaPos.clone().applyMatrix4(coneGroup.matrixWorld).project(camera);
            thetaLabel.style.left = `${(vTheta.x * 0.5 + 0.5) * window.innerWidth}px`;
            thetaLabel.style.top = `${(vTheta.y * -0.5 + 0.5) * window.innerHeight}px`;
        } else {
            hLabel.style.display = 'none';
            thetaLabel.style.display = 'none';
        }
    }

    const MAX_STEPS = 14;
    window.currentStep = 0;
    let isAnimating = false;

    function tweenObj(obj, props, duration, easing = TWEEN.Easing.Quadratic.Out, onUpdate = null) {
        return new Promise(resolve => {
            const tween = new TWEEN.Tween(obj).to(props, duration).easing(easing).onComplete(resolve);
            if (onUpdate) tween.onUpdate(onUpdate);
            tween.start();
        });
    }

    function snapToStep(step, snapCamera = true) {
        updateMathFormulaImmediate(step);

        if (step >= 12) {
            coneGroup.position.copy(targetVertex);
            coneGroup.quaternion.copy(finalQuat);
        } else {
            coneGroup.position.copy(coneInitialPos);
            coneGroup.quaternion.identity();
        }

        coneMesh.material.opacity = (step >= 1 && step < 13) ? 0.3 : 0;
        coneEdges.material.opacity = (step >= 1 && step < 13) ? 0.7 : 0;

        [hLine, rLine, hypLine, hypLine2, arcLine].forEach(l => {
            l.visible = (step === 1);
            l.material.opacity = (step === 1) ? 1 : 0;
        });

        ptMeshes.forEach((pt, i) => {
            pt.visible = (step >= 2 && step < 14);
            pt.material.opacity = (step >= 2 && step < 14) ? 1 : 0;
            pt.scale.set(1, 1, 1);
            if (step === 2) {
                pt.position.copy(ptData[i].pUnitEdge);
            } else if (step === 3) {
                pt.position.copy(ptData[i].pEdge);
            } else if (step >= 4) {
                pt.position.copy(ptData[i].pInner);
            }
        });

        radialLines.forEach((rl) => {
            rl.visible = (step >= 2 && step < 13);
            rl.material.opacity = (step >= 2 && step < 13) ? 0.8 : 0;
        });

        circleLine.visible = (step === 2 || step === 3);
        circleLine.material.opacity = (step === 2 || step === 3) ? 0.8 : 0;
        const c_sc = (step === 2) ? 1.0 : coneRadius;
        circleLine.scale.set(c_sc, c_sc, c_sc);

        vertexDot.visible = (step >= 5);
        vertexDot.scale.set(1, 1, 1);

        arrNorm.visible = (step === 5);
        if (step === 5) arrNorm.setLength(lenVec, lenVec*0.2, lenVec*0.15);

        arrInvNorm.visible = (step >= 6);
        if (step >= 6) arrInvNorm.setLength(lenVec, lenVec*0.2, lenVec*0.15);

        arrUp.visible = (step === 7 || step === 8);
        if (step === 7 || step === 8) arrUp.setLength(lenVec, lenVec*0.2, lenVec*0.15);

        arrRight.visible = (step >= 8);
        if (step >= 8) arrRight.setLength(lenVec, lenVec*0.2, lenVec*0.15);

        arrTrueUp.visible = (step >= 10);
        if (step >= 10) arrTrueUp.setLength(lenVec, lenVec*0.2, lenVec*0.15);

        rays.forEach((r, i) => {
            r.visible = (step >= 13);
            if (step >= 13) {
                r.material.opacity = 0.8;
                const startPt = targetVertex;
                let endPt;
                if (step === 13) {
                    const dir = ptData[i].pInner.clone().normalize().applyQuaternion(finalQuat);
                    endPt = startPt.clone().add(dir.multiplyScalar(50));
                } else {
                    endPt = intersectPts[i];
                }
                r.geometry.setFromPoints([startPt, endPt]);
            }
        });

        intersectDots.forEach((dot, i) => {
            if(step >= 14 && hitDistances[i] < 15) {
                dot.visible = true;
                dot.position.copy(intersectPts[i]);
                dot.scale.set(1,1,1);
            } else {
                dot.visible = false;
            }
        });

        // Camera Snap Logic
        if (snapCamera) {
            if (step >= 13) {
                controls.target.copy(targetVertex);
                camera.position.set(targetVertex.x - 5, targetVertex.y + 2, targetVertex.z + 8);
            } else if (step >= 12) {
                controls.target.copy(targetVertex);
                camera.position.set(targetVertex.x + 6, targetVertex.y + 4, targetVertex.z + 4);
            } else if (step >= 5) {
                controls.target.copy(targetVertex);
                camera.position.set(targetVertex.x + 3, targetVertex.y + 3, targetVertex.z + 8);
            } else if (step >= 2 && step <= 4) {
                controls.target.set(0, coneHeight, 0);
                camera.position.set(0.1, 12, 0.1);
            } else {
                controls.target.copy(coneInitialPos);
                camera.position.copy(startCamPos);
            }
        }
    }

    async function animateTransition(step) {
        changeMathFormula(step);

        if (step === 1) {
            [hLine, rLine, hypLine, hypLine2, arcLine].forEach(l => l.visible = true);
            await Promise.all([
                tweenObj(coneMesh.material, { opacity: 0.3 }, 800),
                tweenObj(coneEdges.material, { opacity: 0.7 }, 800),
                tweenObj(hLine.material, { opacity: 1 }, 800)
            ]);
            await Promise.all([
                tweenObj(arcLine.material, { opacity: 1 }, 600),
                tweenObj(rLine.material, { opacity: 1 }, 600),
                tweenObj(hypLine.material, { opacity: 1 }, 600),
                tweenObj(hypLine2.material, { opacity: 1 }, 600)
            ]);
        }
        else if (step === 2) {
            [hLine, rLine, hypLine, hypLine2, arcLine].forEach(l => tweenObj(l.material, { opacity: 0 }, 500).then(()=> l.visible = false));

            // Trượt Camera mềm mại từ vị trí hiện tại của user về Top-Down
            window.isCameraPanning = true;
            const panTarget = tweenObj(controls.target, {x: 0, y: coneHeight, z: 0}, 1500, TWEEN.Easing.Cubic.InOut);
            const panCam = tweenObj(camera.position, {x: 0.1, y: 12, z: 0.1}, 1500, TWEEN.Easing.Cubic.InOut);

            const promises = ptMeshes.map((pt, i) => {
                pt.visible = true;
                pt.position.copy(ptData[i].pUnitEdge);
                pt.scale.set(0.01, 0.01, 0.01);
                return tweenObj(pt.scale, {x:1, y:1, z:1}, 600, TWEEN.Easing.Back.Out);
            });

            radialLines.forEach((rl) => {
                rl.visible = true;
                rl.material.opacity = 0;
                promises.push(tweenObj(rl.material, { opacity: 0.8 }, 600));
            });

            circleLine.visible = true;
            circleLine.scale.set(1, 1, 1);
            circleLine.material.opacity = 0;
            promises.push(tweenObj(circleLine.material, { opacity: 0.8 }, 600));

            promises.push(
                Promise.all([panTarget, panCam]).then(() => { window.isCameraPanning = false; })
            );
            await Promise.all(promises);
        }
        else if (step === 3) {
            // Giãn nở đường tròn và điểm ra khớp với r
            const promises = ptMeshes.map((pt, i) => {
                return tweenObj(pt.position, {x: ptData[i].pEdge.x, y: ptData[i].pEdge.y, z: ptData[i].pEdge.z}, 1000, TWEEN.Easing.Cubic.InOut);
            });

            promises.push(tweenObj(circleLine.scale, { x: coneRadius, y: coneRadius, z: coneRadius }, 1000, TWEEN.Easing.Cubic.InOut));
            await Promise.all(promises);
        }
        else if (step === 4) {
            const promises = ptMeshes.map((pt, i) => {
                return tweenObj(pt.position, {x: ptData[i].pInner.x, y: ptData[i].pInner.y, z: ptData[i].pInner.z}, 1000, TWEEN.Easing.Cubic.Out);
            });
            promises.push(tweenObj(circleLine.material, { opacity: 0 }, 800).then(() => circleLine.visible = false));
            await Promise.all(promises);
        }
        else if (step === 5) {
            window.isCameraPanning = true;
            const panTarget = tweenObj(controls.target, {x: targetVertex.x, y: targetVertex.y, z: targetVertex.z}, 1500, TWEEN.Easing.Cubic.InOut);
            const panCam = tweenObj(camera.position, {x: targetVertex.x + 3, y: targetVertex.y + 3, z: targetVertex.z + 8}, 1500, TWEEN.Easing.Cubic.InOut);

            vertexDot.visible = true;
            vertexDot.scale.set(0.01, 0.01, 0.01);
            tweenObj(vertexDot.scale, {x:1, y:1, z:1}, 1000, TWEEN.Easing.Back.Out);

            const promisesArray = [
                Promise.all([panTarget, panCam]).then(() => { window.isCameraPanning = false; })
            ];
            await Promise.all(promisesArray);

            arrNorm.visible = true;
            arrNorm.setLength(0.01, 0, 0);
            await tweenObj({l:0}, {l:lenVec}, 600, TWEEN.Easing.Quadratic.Out, obj => arrNorm.setLength(obj.l, obj.l*0.2, obj.l*0.15));
        }
        else if (step === 6) {
            arrInvNorm.visible = true;
            arrInvNorm.setLength(0.01, 0, 0);

            await Promise.all([
                tweenObj({l:lenVec}, {l:0.01}, 600, TWEEN.Easing.Quadratic.Out, obj => arrNorm.setLength(obj.l, obj.l*0.2, obj.l*0.15)),
                tweenObj({l:0}, {l:lenVec}, 600, TWEEN.Easing.Quadratic.Out, obj => arrInvNorm.setLength(obj.l, obj.l*0.2, obj.l*0.15))
            ]).then(() => arrNorm.visible = false);
        }
        else if (step === 7) {
            arrUp.visible = true; arrUp.setLength(0.01, 0, 0);
            await tweenObj({l:0}, {l:lenVec}, 600, TWEEN.Easing.Quadratic.Out, obj => arrUp.setLength(obj.l, obj.l*0.2, obj.l*0.15));
        }
        else if (step === 8) {
            arrRight.visible = true; arrRight.setLength(0.01, 0, 0);
            await tweenObj({l:0}, {l:lenVec}, 600, TWEEN.Easing.Quadratic.Out, obj => arrRight.setLength(obj.l, obj.l*0.2, obj.l*0.15));
        }
        else if (step === 9) {
            await tweenObj({l:lenVec}, {l:0.01}, 400, TWEEN.Easing.Quadratic.In, obj => arrUp.setLength(obj.l, obj.l*0.2, obj.l*0.15))
                .then(() => arrUp.visible = false);
        }
        else if (step === 10) {
            arrTrueUp.visible = true; arrTrueUp.setLength(0.01, 0, 0);
            await tweenObj({l:0}, {l:lenVec}, 600, TWEEN.Easing.Quadratic.Out, obj => arrTrueUp.setLength(obj.l, obj.l*0.2, obj.l*0.15));
        }
        else if (step === 11) {
            await new Promise(r => setTimeout(r, 600));
        }
        else if (step === 12) {
            window.isCameraPanning = true;
            const panTarget = tweenObj(controls.target, {x: targetVertex.x, y: targetVertex.y, z: targetVertex.z}, 1200, TWEEN.Easing.Cubic.InOut);
            const panCam = tweenObj(camera.position, {x: targetVertex.x + 6, y: targetVertex.y + 4, z: targetVertex.z + 4}, 1200, TWEEN.Easing.Cubic.InOut);

            const qStart = coneGroup.quaternion.clone();
            const qTween = tweenObj({ t: 0 }, { t: 1 }, 1200, TWEEN.Easing.Cubic.InOut, obj => coneGroup.quaternion.slerpQuaternions(qStart, finalQuat, obj.t));
            const pTween = tweenObj(coneGroup.position, {x: targetVertex.x, y: targetVertex.y, z: targetVertex.z}, 1200, TWEEN.Easing.Cubic.InOut);

            await Promise.all([pTween, qTween, panTarget, panCam]).then(() => { window.isCameraPanning = false; });
        }
        else if (step === 13) {
            window.isCameraPanning = true;
            const panTarget = tweenObj(controls.target, {x: targetVertex.x, y: targetVertex.y, z: targetVertex.z}, 1200, TWEEN.Easing.Cubic.InOut);
            const panCam = tweenObj(camera.position, {x: targetVertex.x - 5, y: targetVertex.y + 2, z: targetVertex.z + 8}, 1200, TWEEN.Easing.Cubic.InOut);

            tweenObj(coneMesh.material, { opacity: 0 }, 800);
            tweenObj(coneEdges.material, { opacity: 0 }, 800);
            radialLines.forEach(rl => tweenObj(rl.material, { opacity: 0 }, 800).then(() => rl.visible = false));

            const promises = rays.map((r, i) => {
                r.visible = true;
                r.material.opacity = 0.8;
                const dir = ptData[i].pInner.clone().normalize().applyQuaternion(finalQuat);
                const startPt = targetVertex;
                const endPt = startPt.clone().add(dir.multiplyScalar(50));
                return tweenObj({ t: 0 }, { t: 1 }, 1200, TWEEN.Easing.Cubic.Out, obj => {
                    const currentEnd = startPt.clone().lerp(endPt, obj.t);
                    r.geometry.setFromPoints([startPt, currentEnd]);
                });
            });

            promises.push(panTarget, panCam);
            await Promise.all(promises).then(() => { window.isCameraPanning = false; });
        }
        else if (step === 14) {
            ptMeshes.forEach(pt => tweenObj(pt.material, { opacity: 0 }, 500).then(() => pt.visible = false));

            const promises = rays.map((r, i) => {
                const startPt = targetVertex;
                const dir = ptData[i].pInner.clone().normalize().applyQuaternion(finalQuat);
                const infPt = startPt.clone().add(dir.multiplyScalar(50));
                const hitPt = intersectPts[i];

                if (hitDistances[i] < 15) {
                    intersectDots[i].position.copy(hitPt);
                    intersectDots[i].scale.set(0.01, 0.01, 0.01);
                    intersectDots[i].visible = true;
                    tweenObj(intersectDots[i].scale, {x:1, y:1, z:1}, 500, TWEEN.Easing.Back.Out);
                }

                return tweenObj({ t: 0 }, { t: 1 }, 800, TWEEN.Easing.Cubic.Out, obj => {
                    const currentEnd = infPt.clone().lerp(hitPt, obj.t);
                    r.geometry.setFromPoints([startPt, currentEnd]);
                });
            });
            await Promise.all(promises);
        }
    }

    async function goToStep(step) {
        step = Math.max(0, Math.min(step, MAX_STEPS));
        if (step === window.currentStep && !isAnimating) return;

        TWEEN.removeAll();
        window.isCameraPanning = false;

        if (step < window.currentStep) {
            window.currentStep = step;
            snapToStep(window.currentStep, true);
            isAnimating = false;
        } else {
            if (isAnimating) {
                snapToStep(window.currentStep, true);
                isAnimating = false;
                return;
            }
            isAnimating = true;
            // Không snap camera khi tiến, trượt mượt mà từ vị trí người dùng đang ngắm
            snapToStep(window.currentStep, false);
            window.currentStep = step;
            await animateTransition(window.currentStep);
            isAnimating = false;
        }
    }

    let startX, startY;
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('pointerdown', e => { startX = e.clientX; startY = e.clientY; });
    document.addEventListener('pointerup', e => {
        const dx = e.clientX - startX, dy = e.clientY - startY;
        if (Math.sqrt(dx*dx + dy*dy) < 5) {
            if (e.button === 0) goToStep(window.currentStep + 1);
            else if (e.button === 2) goToStep(window.currentStep - 1);
        }
    });

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    snapToStep(0);

    function animate(time) {
        requestAnimationFrame(animate);
        TWEEN.update(time);

        // Liên tục cập nhật các đường tia đỏ bám dính vào hạt
        radialLines.forEach((rl, i) => {
            if (rl.visible) {
                rl.geometry.setFromPoints([new THREE.Vector3(0, coneHeight, 0), ptMeshes[i].position]);
            }
        });

        // Auto Rotate chỉ hoạt động khi Camera không bị Panning bởi Code
        controls.autoRotate = !window.isCameraPanning;
        controls.update();

        updateLabels();
        renderer.render(scene, camera);
    }
    animate();
</script>
